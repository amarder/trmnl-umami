name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip
        run: zip -r umami.zip src/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: umami.zip
